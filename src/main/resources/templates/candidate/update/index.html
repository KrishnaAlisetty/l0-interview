<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Title</title>
    <link
            crossorigin="anonymous"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            rel="stylesheet"
    />
    <style>
        .form-container {
            background: #ffffff;
            padding: 25px 30px;
            width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .title {
            text-align: center;
        }
    </style>
</head>
<body>
<form class="form-container" id="loginForm">
    <div class="row mb-2">
        <h3 class="form-title h2">Update Candidate Details</h3>
    </div>
    <div class="row mb-3">
        <div class="col">
            <label class="form-label" for="formFile"
            >Upload Candidate Resume</label
            >
            <input class="form-control" id="formFile" type="file"/>
        </div>
        <div class="col">
            <label class="form-label" for="scheduler"
            >Schedule Interview</label
            >
            <input
                    class="form-control"
                    id="scheduler"
                    type="datetime-local"
            />
        </div>
    </div>

    <div class="row mb-3">
        <div class="col">
            <input
                    aria-label="Candidate Name"
                    class="form-control"
                    id="cName"
                    placeholder="Candidate Name"
                    type="text"
            />
        </div>
        <div class="col">
            <input
                    aria-label="Candidate Email"
                    class="form-control"
                    id="cEmail"
                    placeholder="Candidate Email"
                    type="text"
            />
        </div>
    </div>
    <div class="row mb-3">
        <div class="col">
            <input
                    aria-label="Interviewer Name"
                    class="form-control"
                    id="iName"
                    placeholder="Interviewer Name"
                    type="text"
            />
        </div>
        <div class="col">
            <input
                    aria-label="Interviewer Email"
                    class="form-control"
                    id="iEmail"
                    placeholder="Interviewer Email"
                    type="text"
            />
        </div>
    </div>
    <div
            style="
                    display: flex;
                    justify-content: center;
                    align-items: center;
                "
    >
        <button class="btn btn-primary btn-md" type="submit">
            Update
        </button>
    </div>
</form>

<script>
    document.getElementById("loginForm").onsubmit = async (e) => {
        e.preventDefault();

        const cName = document.getElementById("cName").value;
        const cEmail = document.getElementById("cEmail").value;
        const iName = document.getElementById("iName").value;
        const iEmail = document.getElementById("iEmail").value;
        const scheduleTime = document.getElementById("scheduler").value;
        const file = document.getElementById("formFile").files[0];

        const uploadDetails = new FormData();

        // must match DTO field names exactly
        uploadDetails.append("file", file);
        uploadDetails.append("candidateName", cName);
        uploadDetails.append("candidateEmail", cEmail);
        uploadDetails.append("interviewerName", iName);
        uploadDetails.append("interviewerEmail", iEmail);
        uploadDetails.append("scheduleTime", scheduleTime);
        uploadDetails.append(
            "timeZone",
            Intl.DateTimeFormat().resolvedOptions().timeZone,
        );

        const res = await fetch("/update/details", {
            method: "POST",
            body: uploadDetails,
        });

        const data = await res.json();

        console.log(data);
    };
</script>
</body>
</html>
